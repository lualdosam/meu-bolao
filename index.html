<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bolão de Futebol da Família Chapada</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .jogo { margin: 20px; padding: 15px; border: 1px solid #ccc; display: inline-block; }
        input { width: 40px; text-align: center; }
    </style>
</head>
<body>

    <h1>Bolão de Futebol</h1>
    <div id="login">
        <input type="text" id="nome" placeholder="Digite seu nome">
        <button onclick="iniciarBolao()">Entrar</button>
    </div>

    <div id="apostas" style="display:none;">
        <h2 id="mensagemBoasVindas"></h2>
        <div class="jogo">
            <img src="https://flagcdn.com/w40/br.png" alt="Brasil"> Brasil 
            <input type="number" id="gol1" min="0"> x <input type="number" id="gol2" min="0"> 
            <img src="https://flagcdn.com/w40/Hi.png" alt="Haiti"> Haiti
        </div>
        <br>
        <button onclick="enviarPalpite()">Enviar Palpite</button>
    </div>

    <script>
        function iniciarBolao() {
            const nome = document.getElementById('nome').value;
            if (nome) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('apostas').style.display = 'block';
                document.getElementById('mensagemBoasVindas').innerText = "Olá, " + nome + "! Faça seu palpite:";
            } else {
                alert("Por favor, digite seu nome.");
            }
        }

        function enviarPalpite() {
            const g1 = document.getElementById('gol1').value;
            const g2 = document.getElementById('gol2').value;
            alert("Palpite registrado com sucesso! (Integrar com banco de dados em um passo futuro)");
        }
    </script>
</body>
</html>

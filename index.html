<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bolão de Futebol Familia Chapada</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .jogo { margin: 20px; padding: 15px; border: 1px solid #ccc; display: inline-block; }
        input[type="number"] { width: 40px; text-align: center; }
        /* Ajuste do campo nome */
        input[type="text"] { width: 200px; padding: 5px; }
        #resultados { margin-top: 30px; text-align: left; display: inline-block; }
    </style>
</head>
<body>

    <h1>Bolão de Futebol</h1>
    
    <div id="login">
        <input type="text" id="nome" placeholder="Insira seu nome aqui">
        <button onclick="iniciarBolao()">Entrar</button>
    </div>

    <div id="apostas" style="display:none;">
        <h2 id="mensagemBoasVindas"></h2>
        <div class="jogo">
            <img src="https://flagcdn.com/w40/br.png" alt="Brasil"> Brasil 
            <input type="number" id="gol1" min="0" value="0"> x <input type="number" id="gol2" min="0" value="0"> 
            <img src="https://flagcdn.com/w40/ht.png" alt="Haiti"> Haiti
        </div>
        <br>
        <button onclick="enviarPalpite()">Enviar Palpite</button>
    </div>

    <div id="resultados"></div>

    <script>
        let apostasFeitas = [];

        function iniciarBolao() {
            const nome = document.getElementById('nome').value;
            if (nome.trim() !== "") {
                document.getElementById('login').style.display = 'none';
                document.getElementById('apostas').style.display = 'block';
                document.getElementById('mensagemBoasVindas').innerText = "Olá, " + nome + "! Faça seu palpite:";
            } else {
                alert("Por favor, digite seu nome.");
            }
        }

        function enviarPalpite() {
            const nome = document.getElementById('nome').value;
            const g1 = document.getElementById('gol1').value;
            const g2 = document.getElementById('gol2').value;

            // Armazena no array
            apostasFeitas.push({ nome: nome, placar: g1 + " x " + g2 });

            // Exibe na tela
            let htmlResultados = "<h3>Palpites Registrados:</h3><ul>";
            apostasFeitas.forEach(item => {
                htmlResultados += "<li>" + item.nome + ": " + item.placar + "</li>";
            });
            htmlResultados += "</ul>";
            
            document.getElementById('resultados').innerHTML = htmlResultados;
            alert("Palpite de " + nome + " registrado!");
        }
    </script>
</body>
</html>

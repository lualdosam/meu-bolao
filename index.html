<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão Brasil x Haiti - Arquivo Geral</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 10px; margin: 0; background-color: #f9f9f9; }
        h1, h2 { font-size: 1.5em; margin: 15px 0; }
        
        .container { max-width: 600px; margin: 0 auto; }
        input[type="text"], input[type="number"] { padding: 12px; font-size: 1em; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        
        #login input[type="text"] { width: 100%; margin-bottom: 10px; }
        button { background-color: #28a745; color: white; border: none; padding: 15px 30px; font-size: 1em; border-radius: 8px; cursor: pointer; margin: 5px; }
        button:hover { background-color: #218838; }
        button.visualizar { background-color: #007bff; }
        button.visualizar:hover { background-color: #0069d9; }

        .jogo-container { background-color: white; padding: 20px; border-radius: 12px; border: 1px solid #eee; margin-top: 20px; }
        .times { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .times img { width: 40px; height: auto; }
        
        .placares { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; }
        input[type="number"] { width: 60px; text-align: center; }

        #resultados-gerais { text-align: left; margin-top: 20px; background-color: white; padding: 10px; border-radius: 12px; max-height: 300px; overflow-y: auto; }
        #resultados-gerais ul { list-style-type: none; padding: 0; margin: 0; }
        #resultados-gerais li { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; align-items: center; justify-content: space-between; }
        #resultados-gerais span.palpite { font-weight: bold; }
        #resultados-gerais span.bandeiras { display: flex; align-items: center; gap: 5px; }
        #resultados-gerais img { width: 25px; height: auto; }

        .loading { font-style: italic; color: #666; margin: 10px 0; }

        /* Estilos do Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4); }
        .modal-content { background-color: #fefefe; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 85%; max-width: 500px; border-radius: 12px; box-sizing: border-box;}
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close:hover, .close:focus { color: black; text-decoration: none; cursor: pointer; }
        
        @media (min-width: 600px) {
            h1, h2 { font-size: 2em; }
            #login input[type="text"] { width: 70%; }
            .jogo-container { padding: 30px; }
            .times { flex-wrap: nowrap; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bolão Brasil x Haiti</h1>
        
        <div id="login">
            <input type="text" id="nome" placeholder="Insira seu nome aqui">
            <button onclick="iniciarBolao()">Entrar</button>
            <button class="visualizar" onclick="abrirModal()">Ver Palpites Gerais</button>
        </div>

        <div id="apostas" style="display:none;">
            <h2 id="mensagemBoasVindas"></h2>
            
            <div class="jogo-container">
                <div class="times">
                    <div>
                        <img src="https://flagcdn.com/w80/br.png" alt="Brasil">
                        <span>Brasil</span>
                    </div>
                    <span>vs</span>
                    <div>
                        <img src="https://flagcdn.com/w80/ht.png" alt="Haiti">
                        <span>Haiti</span>
                    </div>
                </div>

                <div class="placares">
                    <input type="number" id="gol1" min="0" value="0">
                    <span>x</span>
                    <input type="number" id="gol2" min="0" value="0">
                </div>
                
                <div id="status-envio" class="loading" style="display: none;">Gravando palpite no arquivo central...</div>
                <button id="btn-enviar" onclick="enviarPalpite()">Registrar Meu Palpite</button>
                <button class="visualizar" onclick="abrirModal()">Ver Todos os Palpites</button>
            </div>
        </div>

        <div id="palpitesModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="fecharModal()">&times;</span>
                <h3>Palpites Gravados no Arquivo Central</h3>
                <div id="status-busca" class="loading">Buscando informações na planilha...</div>
                <div id="resultados-gerais">
                    <ul id="lista-palpites"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // LINK DO SEU GOOGLE APPS SCRIPT (SUBSTITUA ABAIXO)
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbymHzvX0cxuYLnKX6ZycJqpdo7hC9cW78xwLifZ-cVYEtTt67jrARqLkOqmtmnYux4/exec";

        function carregarPalpitesGerais() {
            document.getElementById('status-busca').style.display = 'block';
            const listaHtml = document.getElementById('lista-palpites');
            listaHtml.innerHTML = '';

            // Busca os dados em tempo real da Planilha Google via API
            fetch(WEB_APP_URL)
            .then(response => response.json())
            .then(palpites => {
                document.getElementById('status-busca').style.display = 'none';
                if (palpites.length === 0) {
                    listaHtml.innerHTML = '<li>Nenhum palpite registrado no arquivo ainda.</li>';
                } else {
                    palpites.forEach(p => {
                        listaHtml.innerHTML += `
                            <li>
                                <span>${p.nome}:</span>
                                <span class="bandeiras">
                                    <img src="https://flagcdn.com/w40/br.png" alt="Brasil">
                                    <span class="palpite">${p.placar}</span>
                                    <img src="https://flagcdn.com/w40/ht.png" alt="Haiti">
                                </span>
                            </li>`;
                    });
                }
            })
            .catch(error => {
                document.getElementById('status-busca').innerText = "Erro ao carregar os dados centralizados.";
                console.error("Erro:", error);
            });
        }

        function iniciarBolao() {
            const nomeInput = document.getElementById('nome');
            const nome = nomeInput.value.trim();
            if (nome) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('apostas').style.display = 'block';
                document.getElementById('mensagemBoasVindas').innerText = "Olá, " + nome + "! Dê o seu palpite:";
                localStorage.setItem('nomeUsuarioAtual', nome);
            } else {
                alert("Por favor, digite seu nome.");
            }
        }

        function enviarPalpite() {
            const nome = localStorage.getItem('nomeUsuarioAtual');
            const g1 = document.getElementById('gol1').value;
            const g2 = document.getElementById('gol2').value;
            const placarFinal = g1 + " x " + g2;

            document.getElementById('status-envio').style.display = 'block';
            document.getElementById('btn-enviar').disabled = true;

            // Envia o palpite diretamente para a sua Planilha Google salvar no arquivo
            const urlParaEnviar = `${WEB_APP_URL}?nome=${encodeURIComponent(nome)}&placar=${encodeURIComponent(placarFinal)}`;

            fetch(urlParaEnviar)
            .then(response => response.json())
            .then(data => {
                document.getElementById('status-envio').style.display = 'none';
                document.getElementById('btn-enviar').disabled = false;
                if(data.status === "success") {
                    alert("Sucesso! Seu palpite foi salvo permanentemente no arquivo geral.");
                }
            })
            .catch(error => {
                document.getElementById('status-envio').innerText = "Erro ao salvar palpite no servidor central.";
                document.getElementById('btn-enviar').disabled = false;
                console.error("Erro:", error);
            });
        }

        function abrirModal() {
            document.getElementById('palpitesModal').style.display = 'block';
            carregarPalpitesGerais();
        }

        function fecharModal() {
            document.getElementById('palpitesModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('palpitesModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
